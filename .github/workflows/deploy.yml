name: Deploy to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        directory: ["./core", "./email"]

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.directory }}/go.mod

      - name: Vet backend
        run: go vet ./...

      - name: Build backend
        run: go build ./...

  frontend:
    name: Set up frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            REPO="git@github.com:winnerx0/kron.git"
            BRANCH="main"
            DEPLOY_DIR="/opt/kivia"

            mkdir -p "$DEPLOY_DIR"

            if [ -d "$DEPLOY_DIR/.git" ]; then
              git -C "$DEPLOY_DIR" fetch origin
            else
              git -C "$DEPLOY_DIR" init
              git -C "$DEPLOY_DIR" remote add origin "$REPO"
              git -C "$DEPLOY_DIR" fetch origin
            fi
            git -C "$DEPLOY_DIR" checkout -B "$BRANCH" "origin/$BRANCH"
            git -C "$DEPLOY_DIR" reset --hard "origin/$BRANCH"

            cd "$DEPLOY_DIR"
            test -f .env
            docker compose -f docker-compose-prod.yml down --remove-orphans
            docker compose -f docker-compose-prod.yml build --no-cache
            docker compose -f docker-compose-prod.yml up -d
            sleep 5
            docker compose -f docker-compose-prod.yml ps
            docker compose -f docker-compose-prod.yml logs --tail=20
