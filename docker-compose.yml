name: kivia

services:

  core:
    build: './core'
    ports:
      - '8081'
    container_name: core
    env_file:
      - .env
    environment:
      PORT: 8081
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://core:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  email_service:
    build: './email'
    container_name: email_service
    ports:
      - "8082"
    env_file:
      - .env
    environment:
      PORT: 8082
    depends_on:
      rabbitmq:
        condition: service_healthy
  nginx:
    build: './nginx'
    ports:
      - '80:80'
    depends_on:
      core:
        condition: service_healthy
      email_service:
        condition: service_started
  rabbitmq:
    image: 'rabbitmq:latest'
    ports:
      - '5672:5672'
      - '15672:15672'
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl status"]
      interval: 5s
      retries: 5

  postgres:
    image: 'postgres:16-alpine'
    ports:
      - '5432:5432'
    container_name: kivia_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: kivia
    volumes:
      - kivia_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d kivia"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  kivia_db_data:
  rabbitmq_data: