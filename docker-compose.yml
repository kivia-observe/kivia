services:

  dyno_service:
    build: './dyno_service'
    ports:
      - '8081:8081'
    container_name: dyno_service
    env_file:
      - ./dyno_service/.env.dev
    environment:
        RABBITMQ_HOST: rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://dyno_service:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  email_service:
    build: './email_service'
    container_name: email_service
  nginx:
    build: './nginx'
    ports:
      - '8080:5000'
    depends_on:
      dyno_service:
        condition: service_healthy
      email_service:
        condition: service_started
  rabbitmq:
    image: 'rabbitmq:latest'
    ports:
      - '5672:5672'
      - '15672:15672'
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl status"]
      interval: 5s
      retries: 5

  postgres:
    image: 'postgres:16-alpine'
    ports:
      - '5000:5432'
    container_name: dyno_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dyno
    volumes:
      - dyno_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  dyno_db_data: