worker_processes 1;

events {
    worker_connections 1024;
}

http {

    upstream core {
        server core.railway.internal:8081;
    }
    
    upstream email_service {
        server emailservice.railway.internal:8082;
    }

    limit_req_zone $remote_addr zone=rate_limit:10m rate=100r/s;

    limit_req_zone $http_x_kivia_api_key zone=api_rate_limit:10m rate=100r/s;

    server {
        listen 8080;

        location / {

            limit_req zone=rate_limit burst=20 nodelay;
            limit_req_status 429;

            add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Kivia-Api-Key, X-User-ID' always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Kivia-Api-Key, X-User-ID' always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            auth_request /validate;

            error_page 401 @json_unauthorized;

            error_page 429 @json_too_many_requests;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://core/;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Real-IP $remote_addr;

        }

        location /api/v1/logs/ {

            limit_req zone=rate_limit burst=20 nodelay;
            limit_req_status 429;

            add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Kivia-Api-Key, X-User-ID' always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Kivia-Api-Key, X-User-ID' always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            auth_request /validate;

            error_page 401 @json_unauthorized;

            error_page 429 @json_too_many_requests;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://core/api/v1/logs/;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/logs/create {

            add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
            add_header Access-Control-Allow-Methods 'POST, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, X-Kivia-Api-Key' always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
                add_header Access-Control-Allow-Methods 'POST, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, X-Kivia-Api-Key' always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            limit_req zone=api_rate_limit burst=20 nodelay;
            limit_req_status 429;

            error_page 429 @json_too_many_requests;

            proxy_pass http://core/api/v1/logs/create;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Kivia-Api-Key $http_x_kivia_api_key;
        }

        location /auth/ {

            add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
            add_header Access-Control-Allow-Methods 'POST, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept' always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
                add_header Access-Control-Allow-Methods 'POST, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept' always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            proxy_pass http://core/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/email/ {

            add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
            add_header Access-Control-Allow-Methods 'POST, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept' always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
                add_header Access-Control-Allow-Methods 'POST, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept' always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            limit_req zone=api_rate_limit burst=20 nodelay;

            auth_request /validate;

            error_page 401 @json_unauthorized;

            error_page 429 @json_too_many_requests;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://email_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Role $user_role;
        }

        location = /validate {
            internal;
            proxy_pass http://core/auth/validate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }

        # TODO Add validation end point for api keys

        location @json_unauthorized {
            internal;
            default_type application/json;
            add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Kivia-Api-Key, X-User-ID' always;
            return 401 '{"error": "Unauthorized"}';
        }

        location @json_too_many_requests {
            internal;
            default_type application/json;
            add_header Access-Control-Allow-Origin 'https://kivia-observe.vercel.app' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Kivia-Api-Key, X-User-ID' always;
            return 429 '{"error": "Too many requests"}';
        }
    }
}
