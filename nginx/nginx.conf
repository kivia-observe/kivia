worker_processes 1;

events {
    worker_connections 1024;
}

http {
    
    upstream dyno_service {
        server dyno_service:8081;
    }

      upstream email_service {
        server email_service:8082;
    }

    limit_req_zone $remote_addr zone=rate_limit:10m rate=100r/s;
    
    limit_req_zone $http_x_dyno_api_key zone=api_rate_limit:10m rate=100r/s;

    server {
        listen 8080;

        location / {

            limit_req zone=rate_limit burst=20 nodelay;
            limit_req_status 429;

            auth_request /validate;

            error_page 401 @json_unauthorized;

            error_page 429 @json_too_many_requests;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://dyno_service/;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Real-IP $remote_addr;

        }

        location /api/v1/logs/ {
            limit_req zone=rate_limit burst=20 nodelay;
            limit_req_status 429;

            auth_request /validate;

            error_page 401 @json_unauthorized;

            error_page 429 @json_too_many_requests;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://dyno_service/api/v1/logs/;
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/logs/create {
            limit_req zone=api_rate_limit burst=20 nodelay;
            limit_req_status 429;

            error_page 429 @json_too_many_requests;

            proxy_pass http://dyno_service/api/logs/create;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-dyno-api-key $http_x_dyno_api_key;
        }

        location /auth/ {
            proxy_pass http://dyno_service/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /email/ {
            proxy_pass http://email_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /validate {
            internal;
            proxy_pass http://dyno_service/auth/validate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }

        # TODO Add validation end point for api keys

        location @json_unauthorized {
            internal;
            default_type application/json;
            return 401 '{"error": "Unauthorized"}';
        }

        location @json_too_many_requests {
            internal;
            default_type application/json;
            return 429 '{"error": "Too many requests"}';
        }
    }
}